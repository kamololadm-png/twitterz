<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in to X</title>
    <link rel="stylesheet" href="css/darkmode.css" />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <main class="login-card" aria-label="Login form">
      <div class="login-logo" aria-label="X logo">
        <svg viewBox="0 0 24 24" fill="currentColor" width="40" height="40">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.261 5.633 5.902-5.633Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </div>

      <h1 class="login-title">Sign in to X</h1>

      <form>
        <div class="form-group">
          <input class="input-field" type="text" placeholder="Phone, email, or username" />
          <input class="input-field" type="password" placeholder="Password" />
          <button class="login-button" type="submit">Log in</button>
        </div>
      </form>

      <a class="forgot-link" href="#">Forgot password?</a>

      <div class="divider">or</div>

      <button class="create-account-button" type="button">Create account</button>

      <div class="footer-links">
        <a href="#">Terms of Service</a>
        <a href="#">Privacy Policy</a>
      </div>
    </main>
  </body>
</html>
